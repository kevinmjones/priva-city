<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Priva-city</title>
    <meta name="description" content="A playable privacy CTF prototype from OT Labs." />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <main id="shell">
      <section id="game-wrap" aria-label="Priva-city game">
        <div id="game"></div>
        <div id="hud">
          <div class="brand">
            <span class="mark"></span>
            <div>
              <strong>PRIVA-CITY</strong>
              <span>Trust restoration protocol</span>
            </div>
          </div>
          <div class="meters">
            <span><b>Time</b><span id="timer">00:00</span></span>
            <span><b>Code</b><span id="code-slots">-- -- --</span></span>
            <span><b>Sigils</b><span id="sigils">0/4</span></span>
          </div>
        </div>
        <aside id="quest-log" aria-live="polite">
          <h1>Main Quest</h1>
          <ol id="quest-list"></ol>
          <h2>Side Quest</h2>
          <p id="side-quest">Find the four consent sigils hidden around Priva-city.</p>
        </aside>
        <div id="hint" aria-live="polite">
          <span id="promptText"></span>
          <span id="controlHelp">Move <kbd>A</kbd><kbd>D</kbd> or arrows · Jump <kbd>Space</kbd> · Interact <kbd>E</kbd></span>
        </div>
        <div id="touch-controls" aria-label="Touch controls">
          <div class="touch-pad">
            <button type="button" data-touch="left" aria-label="Move left">←</button>
            <button type="button" data-touch="right" aria-label="Move right">→</button>
          </div>
          <div class="touch-actions">
            <button type="button" data-touch="jump" aria-label="Jump">↑</button>
            <button type="button" data-touch="interact" aria-label="Interact">E</button>
          </div>
        </div>
      </section>
    </main>

    <dialog id="modal">
      <form method="dialog">
        <button id="close-modal" value="cancel" aria-label="Close">×</button>
      </form>
      <div id="modal-body"></div>
    </dialog>

    <script src="src/game.js"></script>
  </body>
</html>
